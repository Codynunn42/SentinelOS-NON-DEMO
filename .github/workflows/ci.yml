name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f STATUS_REPORT.md

      - name: Print repository structure
        run: |
          echo "SentinelOS NON-DEMO baseline CI running"
          find . -maxdepth 3 -type f | sort

      - name: Confirm workflow complete
        run: echo "Baseline CI passed"
