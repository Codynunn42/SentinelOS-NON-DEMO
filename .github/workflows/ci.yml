name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sentinel-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (none yet)
        run: npm install || true

      - name: Start API
        run: |
          node apps/api/server.js &
          sleep 2

      - name: Run healthcheck
        run: node scripts/healthcheck.js

      - name: Done
        run: echo "Sentinel API health validated"
